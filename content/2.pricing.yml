faq:
  title: Pricing FAQ
  description: Common questions about Ranking Shorts plans.
  items:
    - label: Can I try it for free?
      content: Yes. You get one ranking video per day without signing in. Sign in to save your work and unlock more.
    - label: What formats are supported?
      content: Paste TikTok, Instagram or YouTube links, or upload your own video files. We export a vertical 9:16 MP4.
    - label: Can I cancel anytime?
      content: Yes. Manage your subscription from the dashboard billing page.
